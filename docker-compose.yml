services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  redis-init:
    image: python:3.11-slim
    container_name: redis-init
    depends_on:
      - redis
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "pip install redis &&
             python storage/load_to_redis.py"

volumes:
  redis_data: